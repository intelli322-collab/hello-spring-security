<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
        </ul>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">상품 수정</h4>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/products/{id}/edit(id=${productId})}"
                  th:object="${productDto}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">상품명</label>
                    <input type="text" class="form-control" th:field="*{name}"/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">가격</label>
                    <input type="number" class="form-control" th:field="*{price}"/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">재고</label>
                    <input type="number" class="form-control" th:field="*{stock}"/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">설명</label>
                    <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger px-4">수정 완료</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>
<p style="margin-top:40px; padding:12px; border-top:1px solid #ccc; text-align:center; color:#555; font-size:14px;"
th:text="${' 학번: 2291093 │ 성명: 이재령 | 실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd (E) a HH:mm:ss') }"></p>
</body>
</html>
